name: Java CI/CD Pipeline  # Name of the pipeline

on:
  push:
    branches:
      - main  # Run this pipeline whenever code is pushed to the 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest  # Run this on a Linux machine (GitHub provides a virtual machine)
    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # This step gets your code from GitHub
      - name: Set up JDK 17
        uses: actions/setup-java@v2  # This sets up Java 17
        with:
          java-version: '17'  # Using Java version 17
      - name: Build with Maven
        run: mvn clean install -DskipTests  # Run Maven to build the project without running tests

  test:
    runs-on: ubuntu-latest  # Run this on another Linux machine
    needs: build  # This runs after the 'build' job
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Run Unit Tests
        run: mvn test  # Run tests to check if the code works

  upload-artifacts:
    runs-on: ubuntu-latest
    needs: build  # This runs after the 'build' job
    steps:
      - name: Upload JAR File as Artifact
        uses: actions/upload-artifact@v3  # This uploads the built JAR file
        with:
          name: my-app-jar  # Name of the artifact (your app)
          path: target/*.jar  # Path to your JAR file (Maven puts it in the 'target' folder)

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test, upload-artifacts]  # This runs after the previous steps
    steps:
      - name: Deploy to Cloud (Example)
        run: echo "Deploying to Cloud..."  # For now, just a placeholder
