name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main  # Run when code is pushed to the main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Run on a Linux machine
    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # Checkout code from GitHub
      - name: Set up JDK 17
        uses: actions/setup-java@v2  # Set up Java 17
        with:
          java-version: '17'
      - name: Build with Maven
        run: mvn clean install -DskipTests  # Build project without tests

  test:
    runs-on: ubuntu-latest
    needs: build  # Run after the build job
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Run Unit Tests
        run: mvn test  # Run tests to make sure everything works

  upload-artifacts:
    runs-on: ubuntu-latest
    needs: build  # Run after the build job
    steps:
      - name: Upload JAR File as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: my-app-jar
          path: target/*.jar  # Path to your JAR file

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test, upload-artifacts]
    steps:
      - name: Deploy to Cloud (Example)
        run: echo "Deploying to Cloud..."
